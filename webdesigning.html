<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

/* modern button */
a{
    text-decoration:none;
    background:white;
    color:#333;
    padding:15px 30px;
    font-size:20px;
    font-weight:bold;
    border-radius:8px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    transition:all 0.3s ease;
}

/* hover animation */
a:hover{
    transform:translateY(-4px);
    box-shadow:0 12px 25px rgba(0,0,0,0.3);
    background:#f5f5f5;
}</style>
</head>
<body>
    <a href="https://insumitsingh70-prog.github.io/my-website-/">my design </a>
</body>
</html>
